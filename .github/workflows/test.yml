name: Test

on:
  # Don't use `paths` or `paths-ignore` filter since this workflow is required
  # for all pull requests on main irrespective of file type or location
  # Use `changed-src-files` step to determine if source code was changed
  pull_request:
    # add labeled and unlabeled to the default types (runs when label is added)
    types: [opened, synchronize, reopened, labeled, unlabeled, auto_merge_enabled]
    branches: [main]

  push:
    branches: [main]

  workflow_dispatch:

env:
  FORCE_COLOR: "1"
  VLLM_CPU_DISABLE_AVX512: "true"
  VLLM_TARGET_DEVICE: "empty"
  VLLM_PLUGINS: "sendnn_inference"
  HF_HUB_CACHE: "${{ github.workspace }}/.cache/huggingface/hub"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        python_version: ["3.12"]
        vllm_version:
          - name: "default"
            repo: ""
          - name: "vLLM:main"
            repo: "git+https://github.com/vllm-project/vllm --branch main"
        test_suite:
          - name: "chunked prefill"
            markers: "cpu and decoder and not prefix_caching and not quantized and not multimodal"
          - name: "prefix caching"
            markers: "cpu and decoder and prefix_caching and not quantized"
          - name: "fp8"
            markers: "cpu and quantized and multi"
            flags: "--timeout=600 -k 'basic and test_output' --durations=0"
          - name: "embedding"
            markers: "cpu and embedding and not quantized"
            flags: "--timeout=300"
          - name: "scoring"
            markers: "cpu and scoring"
            flags: "--timeout=300"
          - name: "worker and utils"
            markers: "not e2e and not quantized and not spyre and not multimodal"
            flags: "--timeout=300"
          - name: "multimodal"
            markers: "cpu and multimodal"
            flags: "--timeout=300 -sv"
            env_overrides: "HF_HUB_OFFLINE=0"
        include:
          # Lower bound support
          - vllm_version:
              name: "vLLM:lowest"
              repo: "git+https://github.com/vllm-project/vllm --tag v0.19.1"
            test_suite:
              name: "backward compat"
              markers: "compat or (cpu and basic and not quantized)"
              flags: "--timeout=300"
            os: "ubuntu-latest"
            python_version: "3.12"
          # Intermediate versions of vllm to check basic support for as well
          - vllm_version:
              name: "vLLM:0.20.0"
              repo: "git+https://github.com/vllm-project/vllm --tag v0.20.0"
            test_suite:
              name: "backward compat"
              markers: "compat or (cpu and basic and not quantized)"
              flags: "--timeout=300"
            os: "ubuntu-latest"
            python_version: "3.12"
          - vllm_version:
              name: "vLLM:0.20.1"
              repo: "git+https://github.com/vllm-project/vllm --tag v0.20.1"
            test_suite:
              name: "backward compat"
              markers: "compat or (cpu and basic and not quantized)"
              flags: "--timeout=300"
            os: "ubuntu-latest"
            python_version: "3.12"
          - vllm_version:
              name: "vLLM:0.20.2"
              repo: "git+https://github.com/vllm-project/vllm --tag v0.20.2"
            test_suite:
              name: "backward compat"
              markers: "compat or (cpu and basic and not quantized)"
              flags: "--timeout=300"
            os: "ubuntu-latest"
            python_version: "3.12"
          - vllm_version:
              name: "vLLM:0.21.0"
              repo: "git+https://github.com/vllm-project/vllm --tag v0.21.0"
            test_suite:
              name: "backward compat"
              markers: "compat or (cpu and basic and not quantized)"
              flags: "--timeout=300"
            os: "ubuntu-latest"
            python_version: "3.12"


        # Only run vllm:main jobs on PRs with `vllm:main` label
        exclude: >-
          ${{
            (
              github.event_name != 'pull_request' ||
              !(contains(toJson(github.event.pull_request.labels), '"vllm:main"'))
            ) && fromJSON('[{"vllm_version":{"name":"vLLM:main"}}]')
              || fromJSON('[]')
          }}


    name: "${{ matrix.test_suite.name }} (${{ matrix.vllm_version.name }})"

    steps:
      - name: "Lightweight disk cleanup"
        # super lightweight cleanup, not nearly as much as actions/free-up-disk-space
        # all rm -rf, no apt/docker — completes in < 1s and frees ~20 GB
        shell: bash
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc /usr/local/.ghcup
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/powershell

      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Get changed source files"
        id: changed-src-files
        uses: tj-actions/changed-files@v46
        with: # Avoid using single or double quotes for multiline patterns
          files: |
            .github/workflows/test.yml
            pyproject.toml
            uv.lock
            tests/**/*.py
            sendnn_inference/**/*.py
            sendnn_inference/config/model_configs.yaml

      - name: "Install uv"
        if: steps.changed-src-files.outputs.any_changed == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: ${{ matrix.python_version }}
          enable-cache: true
          ignore-nothing-to-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: "Set vLLM version"
        if: ( steps.changed-src-files.outputs.any_changed == 'true' && matrix.vllm_version.repo )
        run: |
          uv add ${{ matrix.vllm_version.repo }}
          echo "TEST_VLLM_VERSION=${{ matrix.vllm_version.name }}" >> "$GITHUB_ENV"

      - name: "Install vLLM with Spyre plugin"
        if: steps.changed-src-files.outputs.any_changed == 'true'
        run: |
          uv venv .venv --system-site-packages --clear
          source .venv/bin/activate

          # Syncs both the runtime and dev deps, based on the lockfile contents
          uv sync --frozen
          # Builds and installs the sendnn-inference wheel into .venv
          # This needs to be done after `uv sync`, or the wheel install will be
          # overwritten.
          uv pip install -v .

      - name: "Restore HF models cache"
        id: cache_restore
        if: steps.changed-src-files.outputs.any_changed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.HF_HUB_CACHE }}
          key: ${{ runner.os }}-hf-cache-${{ hashFiles('.github/ci_model_cache.yaml') }}

      - name: "Download HF models"
        if: ( steps.changed-src-files.outputs.any_changed == 'true' && steps.cache_restore.outputs.cache-hit != 'true' )
        run: |
          # The full HF_HUB_CACHE is cached as a single GHA entry keyed on the
          # hash of .github/ci_model_cache.yaml. Edit that file to add/remove
          # models — a fresh download + cache save will run on the next push to
          # main. Stale cache blobs expire after 7 days (or can be deleted by
          # an admin).
          #
          # We cache for reliability, not speed: HF downloads are flaky under
          # concurrent jobs.
          source .venv/bin/activate
          python3 tools/download_model.py --config .github/ci_model_cache.yaml

      - name: "Check HF model cache size"
        if: steps.changed-src-files.outputs.any_changed == 'true'
        run: |
          # GHA cache has a 10 GB total limit. Keep the combined HF cache well
          # under that so other caches (uv, etc) can coexist. If this fails,
          # either prune entries from .github/ci_model_cache.yaml or update
          # tools/download_model.py to exclude unused artifacts (onnx/,
          # openvino/, duplicate framework weights, etc).
          MAX_BYTES=$((8 * 1024 * 1024 * 1024))  # 8 GiB uncompressed
          if [[ -d "${HF_HUB_CACHE}" ]]; then
            size=$(du -sb "${HF_HUB_CACHE}" | cut -f1)
            human=$(du -sh "${HF_HUB_CACHE}" | cut -f1)
            echo "HF cache ${HF_HUB_CACHE}: $human ($size bytes)"
            if (( size > MAX_BYTES )); then
              echo "::error::HF cache is $human, exceeding the 8 GiB limit."
              exit 1
            fi
          fi

      - name: "Save HF models cache"
        if: ( steps.changed-src-files.outputs.any_changed == 'true' && github.event_name != 'pull_request' && steps.cache_restore.outputs.cache-hit != 'true' )
        uses: actions/cache/save@v4
        with:
          path: ${{ env.HF_HUB_CACHE }}
          key: ${{ runner.os }}-hf-cache-${{ hashFiles('.github/ci_model_cache.yaml') }}

      - name: "Run tests"
        if: steps.changed-src-files.outputs.any_changed == 'true'
        env:
          MASTER_PORT: 12355
          MASTER_ADDR: localhost
          DISTRIBUTED_STRATEGY_IGNORE_MODULES: WordEmbedding
          SENDNN_INFERENCE_TEST_MODEL_LIST: ""
          HF_HUB_OFFLINE: 1
        run: |
          # Delete the source code so we can ensure we're testing the installed
          # wheel
          rm -fr sendnn_inference
          # We activate .venv manually and run pytest directly instead of using
          # `uv run`, to avoid having `uv run` re-sync any dependencies or
          # re-install the sendnn-inference package from source
          source .venv/bin/activate

          ${{matrix.test_suite.env_overrides}} python3 -m pytest ${{ matrix.test_suite.flags }} \
            tests -v -m "${{ matrix.test_suite.markers }}"
